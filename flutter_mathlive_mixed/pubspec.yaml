name: flutter_mathlive_mixed
description: >-
  Mixed plain text and inline LaTeX preview (MathLive) plus MathLive editor
  for Flutter (WebView on mobile, iframe on web).
version: 0.1.0
homepage: https://github.com/your-org/flutter_mathlive_mixed
repository: https://github.com/your-org/flutter_mathlive_mixed
issue_tracker: https://github.com/your-org/flutter_mathlive_mixed/issues

environment:
  sdk: ^3.5.4
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.3.2
  webview_flutter_web: ^0.2.3+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/mathlive/
