<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <!-- Absolute URLs: reliable in WebView + blob iframe; baseUrl in Dart matches this version -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mathlive@0.101.2/dist/mathlive-static.css" />
  <script src="https://cdn.jsdelivr.net/npm/mathlive@0.101.2/dist/mathlive.min.js"></script>
  <style>
    /* Stable WebView layout: no document scroll, no double-tap zoom delay on buttons */
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      background: #ffffff;
    }
    /* Flutter web: editor is injected into a div in the host page (not iframe) — same rules */
    .mathlive-mixed-root {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      background: #ffffff;
      box-sizing: border-box;
    }
    #wrap {
      box-sizing: border-box;
      padding: 4px 10px 10px 10px;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 0px));
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
      min-height: 0;
    }
    /*
     * Native MathLive toggles live in the shadow DOM with ::part(). Using position:fixed on
     * those parts breaks tap hit-testing in many mobile WebViews. We hide them and use the
     * in-page toolbar (#toolbar) instead — regular buttons receive touches reliably.
     */
    math-field::part(menu-toggle),
    math-field::part(virtual-keyboard-toggle) {
      display: none !important;
    }
    /* Toolbar: safe-area insets apply here (outside shadow DOM) */
    #toolbar {
      flex: 0 0 auto;
      position: relative;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      box-sizing: border-box;
      padding:
        calc(env(safe-area-inset-top, 0px) + 4px)
        max(8px, env(safe-area-inset-right, 0px))
        6px
        max(8px, env(safe-area-inset-left, 0px));
      min-height: 44px;
      z-index: 20;
      pointer-events: auto;
    }
    #toolbar button {
      flex: 0 0 auto;
      min-width: 44px;
      min-height: 44px;
      padding: 0 12px;
      margin: 0;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: #f8fafc;
      color: #0f172a;
      font-size: 18px;
      line-height: 1;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    #toolbar button:active {
      background: #e2e8f0;
    }
    .mathlive-mixed-root.theme-dark #toolbar button,
    body.theme-dark #toolbar button {
      background: #1e2532;
      border-color: #334155;
      color: #e2e8f0;
    }
    .mathlive-mixed-root.theme-dark #toolbar button:active,
    body.theme-dark #toolbar button:active {
      background: #334155;
    }
    #editor-shell {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-top: 0;
      position: relative;
      z-index: 1;
    }
    math-field {
      flex: 1 1 auto;
      width: 100%;
      min-height: 160px;
      font-size: 22px;
      border-radius: 12px;
      padding: 12px;
      border: 1px solid #e2e8f0;
      box-sizing: border-box;
    }
    math-field:focus { outline: 2px solid #ff6200; outline-offset: 2px; }
    #vk-root {
      flex: 0 0 auto;
      position: relative;
      width: 100%;
      min-height: 0;
    }
    .mathlive-mixed-root.theme-dark { background: #141922; }
    body.theme-dark { background: #141922; }
    .mathlive-mixed-root.theme-dark math-field,
    body.theme-dark math-field {
      background: #1e2532;
      color: #e2e8f0;
      border-color: #334155;
    }
    @media (pointer: coarse) {
      body {
        --keycap-height: 42px;
        --keycap-font-size: 17px;
        --keycap-shift-font-size: 10px;
        --keycap-small-font-size: 11px;
        --keyboard-toolbar-font-size: 15px;
        --keycap-gap: 4px;
      }
      math-field { font-size: 24px; min-height: 180px; }
    }
    /*
     * Keep MathLive's popup menu + its "Insert" submenu fully inside narrow
     * iOS viewports. Without these caps the submenu expands to the right of
     * the parent menu and gets clipped by the screen edge on compact widths.
     */
    .ML__menu,
    .ui-menu-container,
    ui-menu-container,
    ui-submenu,
    [role="menu"] {
      max-width: calc(100vw - 16px) !important;
      max-height: calc(100vh - 16px) !important;
      overflow: auto !important;
      box-sizing: border-box !important;
    }
    .ML__menu [role="menuitem"],
    .ui-menu-container [role="menuitem"],
    ui-menu-container [role="menuitem"],
    [role="menu"] [role="menuitem"] {
      white-space: normal !important;
      word-break: break-word !important;
    }
  </style>
</head>
<body>
<div class="mathlive-mixed-root" id="MATHLIVE_MIXED_ROOT_ID">
  <div id="wrap">
    <div id="toolbar">
      <button
              type="button"
              id="ml-btn-menu"
              aria-label="Math menu"
              onclick="return mlMixedOpenMenu(event);"
              onpointerdown="return mlMixedOpenMenu(event);"
      >⋯</button>
      <button
              type="button"
              id="ml-btn-keyboard"
              aria-label="Virtual keyboard"
              onclick="return mlMixedToggleVk(event);"
              onpointerdown="return mlMixedToggleVk(event);"
      >⌨</button>
    </div>
    <div id="editor-shell">
      <math-field id="mf" math-mode-space="\ " virtual-keyboard-mode="manual"></math-field>
    </div>
    <div id="vk-root">
      <math-virtual-keyboard></math-virtual-keyboard>
    </div>
  </div>
</div>
<script>
  function mlMixedPostToHost(s) {
    var str = String(s == null ? '' : s);
    try {
      if (typeof FlutterLatexSync !== 'undefined' && FlutterLatexSync.postMessage) {
        FlutterLatexSync.postMessage(str);
        return;
      }
    } catch (eSync) {}
    try {
      if (typeof FlutterLatex !== 'undefined' && FlutterLatex.postMessage) {
        FlutterLatex.postMessage(str);
        return;
      }
    } catch (e1) {}
    try {
      var latexPayload = { channel: 'MathLiveMixed', latex: str, clientId: '___MATHLIVE_MIXED_CLIENT___' };
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(latexPayload, '*');
      } else {
        window.postMessage(latexPayload, '*');
      }
    } catch (e2) {}
  }

  function mlMixedExportLatex() {
    try {
      var mf = document.getElementById('mf');
      if (!mf) { mlMixedPostToHost(''); return; }
      var s = (typeof mf.getValue === 'function') ? String(mf.getValue('latex') || '') : '';
      mlMixedPostToHost(s);
    } catch (e) {
      mlMixedPostToHost('');
    }
  }

  function mlMixedSetLatex(latex) {
    var s = String(latex == null ? '' : latex);
    function tryApply() {
      try {
        var mf = document.getElementById('mf');
        if (!mf) return false;
        if (typeof mf.setValue === 'function') {
          mf.setValue(s, { format: 'latex' });
        } else if ('value' in mf) {
          mf.value = s;
        } else {
          return false;
        }
        try { mf.focus(); } catch (e2) {}
        return true;
      } catch (e) {
        return false;
      }
    }
    function scheduleRetries() {
      tryApply();
      setTimeout(tryApply, 0);
      setTimeout(tryApply, 80);
      setTimeout(tryApply, 250);
      setTimeout(tryApply, 600);
    }
    /* Immediate retries (legacy) + wait for `math-field` when Dart runs before MathLive loads */
    scheduleRetries();
    if (typeof customElements !== 'undefined' && customElements.whenDefined) {
      customElements.whenDefined('math-field').then(scheduleRetries).catch(scheduleRetries);
    }
  }

  function mlMixedSetTheme(dark) {
    var root = document.getElementById('MATHLIVE_MIXED_ROOT_ID');
    if (root) {
      root.classList.toggle('theme-dark', !!dark);
    } else {
      document.body.classList.toggle('theme-dark', !!dark);
    }
  }

  window.addEventListener('message', function (ev) {
    var d = ev.data;
    if (!d || d.channel !== 'MathLiveMixedHost') return;
    if (d.clientId !== '___MATHLIVE_MIXED_CLIENT___') return;
    if (d.cmd === 'export') { mlMixedExportLatex(); return; }
    if (d.cmd === 'theme') { mlMixedSetTheme(!!d.dark); return; }
    if (d.cmd === 'setLatex') { mlMixedSetLatex(d.latex); return; }
  });

  /** True when this document is inside an iframe (e.g. Flutter web HtmlElementView). */
  function mlMixedIsInIframe() {
    try {
      return window.parent !== window;
    } catch (e) {
      return true;
    }
  }

  function mlMixedNotifyHostChromeHeight() {
    try {
      requestAnimationFrame(function () {
        requestAnimationFrame(function () {
          try {
            var root = document.getElementById('MATHLIVE_MIXED_ROOT_ID');
            var h = 0;
            if (root) {
              h = Math.ceil(root.scrollHeight);
            } else {
              var b = document.body;
              var el = document.documentElement;
              h = Math.ceil(Math.max(
                b ? b.scrollHeight : 0,
                b ? b.offsetHeight : 0,
                el ? el.scrollHeight : 0,
                el ? el.offsetHeight : 0
              ));
            }
            if (h < 80) h = 80;
            var payload = { channel: 'MathLiveMixed', editorHeight: h, clientId: '___MATHLIVE_MIXED_CLIENT___' };
            if (window.parent && window.parent !== window) {
              window.parent.postMessage(payload, '*');
            } else {
              window.postMessage(payload, '*');
            }
          } catch (e) {}
        });
      });
    } catch (e2) {}
  }

  function mlMixedAttachVirtualKeyboard() {
    var vkRoot = document.getElementById('vk-root');
    if (typeof mathVirtualKeyboard === 'undefined') return;
    /*
     * Attach keyboard to #vk-root when allowed. Blob iframes (legacy) cannot reassign
     * container; Flutter web now hosts this HTML in a div on the main document instead.
     */
    if (vkRoot && !mlMixedIsInIframe()) {
      try {
        mathVirtualKeyboard.container = vkRoot;
      } catch (eContainer) {
        /* keep default container */
      }
    }
    try {
      mathVirtualKeyboard.addEventListener('geometrychange', function () {
        var h = 0;
        try {
          h = mathVirtualKeyboard.boundingRect.height;
        } catch (e0) {}
        if (vkRoot) {
          if (h > 0) {
            vkRoot.style.minHeight = h + 'px';
            vkRoot.style.height = h + 'px';
          } else {
            vkRoot.style.minHeight = '';
            vkRoot.style.height = 'auto';
          }
        }
        mlMixedNotifyHostChromeHeight();
      });
    } catch (e1) {}
    mlMixedNotifyHostChromeHeight();
  }

  /** Prefer MathLive show/hide over flipping .visible (more reliable on web). */
  function mlMixedToggleMathVirtualKeyboardInstance() {
    if (typeof mathVirtualKeyboard === 'undefined') return false;
    try {
      var vis = !!mathVirtualKeyboard.visible;
      if (typeof mathVirtualKeyboard.hide === 'function' && typeof mathVirtualKeyboard.show === 'function') {
        if (vis) {
          mathVirtualKeyboard.hide();
        } else {
          mathVirtualKeyboard.show();
        }
        return true;
      }
    } catch (e0) {}
    try {
      mathVirtualKeyboard.visible = !mathVirtualKeyboard.visible;
      return true;
    } catch (e1) {}
    return false;
  }

  window._mlMixedLastMenuTapAt = 0;
  window._mlMixedLastVkTapAt = 0;

  function mlMixedGetMf() {
    return document.getElementById('mf');
  }

  function mlMixedTapDedupe(lastKey) {
    var now = Date.now();
    var last = window[lastKey] || 0;
    if (now - last < 220) return false;
    window[lastKey] = now;
    return true;
  }

  function mlMixedOpenMenu(ev) {
    if (ev) {
      try { ev.preventDefault(); } catch (e0) {}
      try { ev.stopPropagation(); } catch (e1) {}
    }
    if (!mlMixedTapDedupe('_mlMixedLastMenuTapAt')) return false;
    try {
      var mf = mlMixedGetMf();
      var btnMenu = document.getElementById('ml-btn-menu');
      if (!mf || !btnMenu) return false;
      try { mf.focus(); } catch (f0) {}
      var r = btnMenu.getBoundingClientRect();
      // Natural anchor: centered under the ⋯ button. The menu opens to the
      // right as users expect on wide screens; [mlMixedClampMenusToViewport]
      // pulls it and its "Insert" submenu back inside the viewport on narrow
      // iOS widths.
      var anchorX = r.left + r.width / 2;
      if (typeof mf.showMenu === 'function') {
        mf.showMenu({ location: { x: anchorX, y: r.bottom + 2 } });
        mlMixedClampMenusToViewport();
        return false;
      }
      if (typeof mf.executeCommand === 'function') {
        try {
          mf.executeCommand('toggleContextMenu');
          mlMixedClampMenusToViewport();
          return false;
        } catch (e2) {}
        try {
          mf.executeCommand('showMenu');
          mlMixedClampMenusToViewport();
          return false;
        } catch (e3) {}
      }
      return false;
    } catch (e4) {
      return false;
    }
  }

  var _mlMixedMenuSelector =
    '.ML__menu, .ui-menu-container, ui-menu-container, ui-submenu, [role="menu"]';

  function _mlMixedClampElement(el) {
    if (!el || el.nodeType !== 1) return;
    var rect = el.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;
    var vw = Math.max(
      document.documentElement.clientWidth || 0,
      window.innerWidth || 0
    );
    var vh = Math.max(
      document.documentElement.clientHeight || 0,
      window.innerHeight || 0
    );
    // Hard-cap width first so an oversized menu scrolls internally instead of
    // extending past the right edge.
    if (rect.width > vw - 8) {
      el.style.maxWidth = (vw - 8) + 'px';
      el.style.overflowX = 'auto';
      rect = el.getBoundingClientRect();
    }
    // Right overflow: slide the menu left by the overflow amount.
    if (rect.right > vw - 4) {
      var overflowX = rect.right - (vw - 4);
      var curLeft = parseFloat(el.style.left);
      if (isNaN(curLeft)) curLeft = rect.left;
      el.style.left = Math.max(4, curLeft - overflowX) + 'px';
      el.style.right = 'auto';
    }
    // Left overflow (can happen after the right clamp on very narrow widths).
    var r2 = el.getBoundingClientRect();
    if (r2.left < 4) {
      var curLeft2 = parseFloat(el.style.left);
      if (isNaN(curLeft2)) curLeft2 = r2.left;
      el.style.left = (curLeft2 + (4 - r2.left)) + 'px';
      el.style.right = 'auto';
    }
    // Bottom overflow: pull the menu up so the last row stays visible.
    var r3 = el.getBoundingClientRect();
    if (r3.bottom > vh - 4) {
      var overflowY = r3.bottom - (vh - 4);
      var curTop = parseFloat(el.style.top);
      if (isNaN(curTop)) curTop = r3.top;
      el.style.top = Math.max(4, curTop - overflowY) + 'px';
      el.style.bottom = 'auto';
    }
  }

  /**
   * Keeps MathLive's dropdown menu + its lazily-rendered "Insert" submenu
   * fully inside the visible viewport. Runs for ~200ms after the menu opens
   * because MathLive creates the submenu only after its parent item is
   * hovered/tapped. A MutationObserver also catches any later additions so
   * subsequent submenu opens don't need another trigger.
   */
  function mlMixedClampMenusToViewport() {
    function clampAll() {
      var nodes = document.querySelectorAll(_mlMixedMenuSelector);
      for (var i = 0; i < nodes.length; i++) {
        _mlMixedClampElement(nodes[i]);
      }
    }
    var frames = 0;
    function tick() {
      clampAll();
      frames++;
      if (frames < 12) {
        requestAnimationFrame(tick);
      }
    }
    requestAnimationFrame(tick);
    mlMixedEnsureMenuObserver();
  }

  var _mlMixedMenuObserver = null;
  function mlMixedEnsureMenuObserver() {
    if (_mlMixedMenuObserver) return;
    try {
      _mlMixedMenuObserver = new MutationObserver(function(mutations) {
        for (var m = 0; m < mutations.length; m++) {
          var mut = mutations[m];
          for (var i = 0; i < mut.addedNodes.length; i++) {
            var n = mut.addedNodes[i];
            if (n.nodeType !== 1) continue;
            if (n.matches && n.matches(_mlMixedMenuSelector)) {
              requestAnimationFrame((function(el) {
                return function() { _mlMixedClampElement(el); };
              })(n));
            }
            var inner = n.querySelectorAll
              ? n.querySelectorAll(_mlMixedMenuSelector)
              : null;
            if (inner && inner.length) {
              for (var j = 0; j < inner.length; j++) {
                requestAnimationFrame((function(el) {
                  return function() { _mlMixedClampElement(el); };
                })(inner[j]));
              }
            }
          }
        }
      });
      _mlMixedMenuObserver.observe(document.body, {
        childList: true,
        subtree: true,
      });
    } catch (eObs) {}
  }

  function mlMixedToggleVk(ev) {
    if (ev) {
      try { ev.preventDefault(); } catch (e0) {}
      try { ev.stopPropagation(); } catch (e1) {}
    }
    if (!mlMixedTapDedupe('_mlMixedLastVkTapAt')) return false;
    try {
      var mf = mlMixedGetMf();
      try { if (mf) mf.focus(); } catch (f0) {}

      if (mf && typeof mf.executeCommand === 'function') {
        try { mf.executeCommand('toggleVirtualKeyboard'); return false; } catch (e2) {}
        try { mf.executeCommand('showVirtualKeyboard'); return false; } catch (e3) {}
      }

      if (typeof mathVirtualKeyboard !== 'undefined') {
        try {
          if (mathVirtualKeyboard.executeCommand) {
            mathVirtualKeyboard.executeCommand('toggleVirtualKeyboard');
            setTimeout(mlMixedNotifyHostChromeHeight, 0);
            setTimeout(mlMixedNotifyHostChromeHeight, 120);
            return false;
          }
        } catch (e4) {}
        if (mlMixedToggleMathVirtualKeyboardInstance()) {
          setTimeout(mlMixedNotifyHostChromeHeight, 0);
          setTimeout(mlMixedNotifyHostChromeHeight, 120);
          return false;
        }
      }
      return false;
    } catch (e6) {
      return false;
    }
  }

  function mlMixedWireToolbar() {
    var btnMenu = document.getElementById('ml-btn-menu');
    var btnVk = document.getElementById('ml-btn-keyboard');
    if (!btnMenu || !btnVk) return;
    if (window._mlMixedToolbarWired) return;
    if (window._mlMixedToolbarWiring) return;
    window._mlMixedToolbarWiring = true;

    function bind() {
      if (window._mlMixedToolbarWired) return;
      var mf = document.getElementById('mf');
      if (!mf) return;

      btnMenu.addEventListener('click', mlMixedOpenMenu, true);
      btnVk.addEventListener('click', mlMixedToggleVk, true);
      window._mlMixedToolbarWired = true;
    }

    if (typeof customElements !== 'undefined' && customElements.whenDefined) {
      customElements.whenDefined('math-field').then(bind).catch(bind);
    } else {
      setTimeout(bind, 0);
    }
    /* If CDN is slow, whenDefined may be late — backup bind */
    setTimeout(bind, 1200);
  }

  function mlMixedEventTargetsMathField(ev, mf) {
    if (!mf) return false;
    if (ev.target === mf || mf.contains(ev.target)) return true;
    if (mf.shadowRoot && ev.target && mf.shadowRoot.contains(ev.target)) return true;
    if (typeof ev.composedPath === 'function') {
      var path = ev.composedPath();
      for (var i = 0; i < path.length; i++) {
        if (path[i] === mf) return true;
      }
    }
    return false;
  }

  function mlMixedEnsureMathModeSpace() {
    var mf = document.getElementById('mf');
    if (!mf) return;
    try {
      mf.setAttribute('math-mode-space', '\\ ');
    } catch (e) {}
  }

  var mlMixedSpaceInsertLockUntil = 0;
  function mlMixedInsertLatexSpace(mf) {
    var now = typeof performance !== 'undefined' && performance.now
      ? performance.now()
      : Date.now();
    if (now < mlMixedSpaceInsertLockUntil) {
      return;
    }
    mlMixedSpaceInsertLockUntil = now + 120;
    try {
      if (typeof mf.executeCommand === 'function') {
        try {
          mf.executeCommand(['insert', '\\ ', { format: 'latex' }]);
        } catch (e1) {
          try {
            mf.executeCommand(['insert', '\\ ']);
          } catch (e2) {
            mf.executeCommand('insert', '\\ ');
          }
        }
      } else if (typeof mf.insert === 'function') {
        mf.insert('\\ ', { format: 'latex' });
      }
    } catch (e3) {}
  }

  function mlMixedFixKeys() {
    var mf = document.getElementById('mf');
    if (!mf || mf.dataset.mlMixedKeyFix === '1') return;

    mf.dataset.mlMixedKeyFix = '1';

    mlMixedEnsureMathModeSpace();

    mf.addEventListener(
      'keydown',
      function (ev) {
        if (!mlMixedEventTargetsMathField(ev, mf)) return;
        if (ev.key !== 'Enter') return;
        ev.preventDefault();
        ev.stopPropagation();

        try {
          mf.executeCommand('addRowAfter');
        } catch (e1) {
          try {
            mf.insert('\\newline ', { format: 'latex' });
          } catch (e2) {}
        }
      },
      true
    );

    mf.addEventListener(
      'keydown',
      function (ev) {
        if (!mlMixedEventTargetsMathField(ev, mf)) return;
        if (ev.key !== ' ' && ev.code !== 'Space') return;
        try {
          ev.preventDefault();
        } catch (e0) {}
        try {
          ev.stopImmediatePropagation();
        } catch (e1) {}
        ev.stopPropagation();
        mlMixedInsertLatexSpace(mf);
      },
      true
    );

    mf.addEventListener(
      'beforeinput',
      function (ev) {
        if (ev.inputType !== 'insertText' || ev.data !== ' ') return;
        if (!mlMixedEventTargetsMathField(ev, mf)) return;
        try {
          ev.preventDefault();
        } catch (e2) {}
        ev.stopPropagation();
        mlMixedInsertLatexSpace(mf);
      },
      true
    );
  }

  (function init() {
    mlMixedEnsureMathModeSpace();
    mlMixedAttachVirtualKeyboard();
    mlMixedWireToolbar();
    mlMixedFixKeys();
    setTimeout(mlMixedNotifyHostChromeHeight, 0);
    setTimeout(mlMixedNotifyHostChromeHeight, 200);

    if (typeof customElements !== 'undefined' && customElements.whenDefined) {
      customElements.whenDefined('math-field').then(function () {
        mlMixedEnsureMathModeSpace();
        mlMixedAttachVirtualKeyboard();
        mlMixedWireToolbar();
        mlMixedFixKeys();
      }).catch(function () {});
    }

    setTimeout(mlMixedEnsureMathModeSpace, 0);
    setTimeout(mlMixedAttachVirtualKeyboard, 50);
    setTimeout(mlMixedAttachVirtualKeyboard, 300);
    setTimeout(mlMixedWireToolbar, 0);
    setTimeout(mlMixedFixKeys, 50);
  })();
</script>
</body>
</html>
